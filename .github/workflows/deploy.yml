name: Deploy to Web and Worker EC2

# 告訴 GitHub 當有人 push 程式碼到 main 分支時觸發
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest # GitHub 會開一台暫時的乾淨機器來跑腳本

    steps:
      # ==========================================
      # 階段一：部署到 EC2 A (Web / API 伺服器)
      # ==========================================
      - name: Deploy to Web EC2 (Frontend & Backend)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/easy-travel-scheduler
            
            # 1. 拉取最新程式碼
            git pull origin main
            
            # 2. 重新編譯並啟動網頁層 (明確指定Celery除外的東西)
            sudo docker compose up --build -d nginx redis frontend backend
            
            # 3. 強制重啟 Nginx，讓它重新抓取前後端容器的新 IP
            sudo docker compose restart nginx
            
            # 4. 清除舊的 Docker 資源
            sudo docker system prune -f

      # ==========================================
      # 階段二：部署到 EC2 B (Celery Worker 伺服器)
      # ==========================================
      - name: Deploy to Worker EC2 (Celery Scraper)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_WORKER_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/easy-travel-scheduler
            
            # 1. 拉取最新程式碼
            git pull origin main
            
            # 2. 重新編譯並啟動爬蟲層 (🌟 加入 --no-deps 避免啟動其他服務)
            sudo docker compose up --build -d --no-deps celery_worker
            
            # 3. 清除舊的 Docker 資源
            sudo docker system prune -f