name: Deploy to EC2

# 告訴 GitHub 當有人 push 程式碼到 main 分支時
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest # GitHub 會開一台暫時的乾淨機器來跑腳本

    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3 # 這是一個寫好的 SSH 登入套件
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 以下是機器人登入 EC2 後會自動執行的指令！
            cd ~/easy-travel-scheduler
            
            # 拉取 GitHub 上最新的程式碼
            git pull origin main
            
            # 讓 Docker 重新編譯有更改的部分，並在背景重啟
            sudo docker compose up --build -d
            
            # 大掃除：順手清除舊的、沒在用的 Docker Image，避免 EC2 硬碟爆滿
            sudo docker system prune -f